<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        // Force preview to always load latest: on localhost, unregister service worker
        // so cached old app (no stars, no random mode) is never served.
        if (typeof window === 'undefined' || window.location.hostname !== 'localhost') return;
        if (!('serviceWorker' in navigator)) return;
        var key = 'cli-exercises-sw-cleared';
        if (sessionStorage.getItem(key)) return;
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return;
          Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
            sessionStorage.setItem(key, '1');
            window.location.reload();
          });
        });
      })();
    </script>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fallacy Quiz</title>
    
    <!-- PWA & iOS Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fallacy Quiz">

    <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
