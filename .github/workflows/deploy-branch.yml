# Fallback: if Pages Source = "Deploy from a branch" (not Actions), this pushes built output to gh-pages.
# Use when deploy.yml output is ignored. See ps.md "Branch deploy fallback".
name: Deploy to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci && npm run build
        env:
          VITE_BASE_REPO: ${{ github.event.repository.name }}

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
